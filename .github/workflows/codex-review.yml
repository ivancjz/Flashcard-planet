name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  review:
    runs-on: ubuntu-latest
    # Skip gracefully for forked PRs — secrets are not available to fork workflows
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed so `codex exec review --base` can diff correctly
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Codex CLI
        run: npm install -g @openai/codex@0.128.0

      - name: Authenticate Codex with API key
        run: echo "$OPENAI_API_KEY" | codex login --with-api-key
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Run code review
        run: |
          BASE="${{ github.event.pull_request.base.ref }}"
          codex exec review \
            --base "$BASE" \
            --ephemeral \
            -m o4-mini \
            -o /tmp/codex-review.txt
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Post review as PR comment
        run: |
          printf '## Codex Review\n\n%s\n\n****\n*Automated review by [Codex CLI](https://github.com/openai/codex) · model: o4-mini*\n' \
            "$(cat /tmp/codex-review.txt)" > /tmp/comment-body.txt
          gh pr comment "${{ github.event.pull_request.number }}" --body-file /tmp/comment-body.txt
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
