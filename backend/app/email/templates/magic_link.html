<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Your login link</title>
</head>
<body style="font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;padding:40px 20px;margin:0">
  <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;margin:0 auto;background:#fff;border-radius:8px;overflow:hidden">
    <tr>
      <td style="padding:40px 32px">
        <h1 style="margin:0 0 16px;font-size:22px;color:#111">Sign in to Flashcard Planet</h1>
        <p style="margin:0 0 24px;color:#555;line-height:1.5">
          Click the button below to sign in. This link expires in 15 minutes.
        </p>
        <a href="{{ magic_url }}"
           style="display:inline-block;background:#2563eb;color:#fff;text-decoration:none;padding:12px 24px;border-radius:6px;font-weight:600">
          Sign in
        </a>
        <p style="margin:32px 0 0;color:#888;font-size:13px;line-height:1.5">
          If you didn't request this, you can safely ignore this email.
        </p>
        <p style="margin:16px 0 0;color:#aaa;font-size:12px;word-break:break-all">
          Or copy this URL: {{ magic_url }}
        </p>
      </td>
    </tr>
  </table>
</body>
</html>
