<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flashcard Planet AI Agent</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --border: #30363d;
    --accent: #58a6ff; --accent2: #3fb950; --text: #e6edf3;
    --muted: #8b949e; --danger: #f85149; --warning: #d29922;
    --user-bubble: #1c2d4a; --ai-bubble: #1a2332;
    --font-mono: 'SF Mono', 'Cascadia Code', monospace;
  }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 20px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  .logo { font-size: 18px; font-weight: 700; color: var(--accent); }
  .logo span { color: var(--accent2); }
  .header-right { display: flex; align-items: center; gap: 8px; margin-left: auto; }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
  .status-dot.red { background: var(--danger); animation: none; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .status-label { font-size: 12px; color: var(--muted); }
  .model-badge { font-size: 11px; padding: 3px 8px; border-radius: 12px; font-family: var(--font-mono); background: #0d2137; color: var(--accent); border: 1px solid #1c4070; }

  .context-bar { background: #111827; border-bottom: 1px solid var(--border); padding: 8px 20px; display: flex; gap: 10px; flex-wrap: wrap; flex-shrink: 0; }
  .ctx-badge { font-size: 11px; padding: 3px 8px; border-radius: 12px; font-family: var(--font-mono); font-weight: 500; }
  .ctx-badge.blue { background: #0d2137; color: var(--accent); border: 1px solid #1c4070; }
  .ctx-badge.green { background: #0d2114; color: var(--accent2); border: 1px solid #1a4a22; }
  .ctx-badge.yellow { background: #2a1f05; color: var(--warning); border: 1px solid #5a3e0a; }

  .quick-actions { background: var(--surface); border-bottom: 1px solid var(--border); padding: 8px 20px; display: flex; gap: 8px; overflow-x: auto; flex-shrink: 0; }
  .qa-btn { background: #21262d; border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; transition: all 0.15s; font-family: inherit; }
  .qa-btn:hover { background: #2d333b; border-color: var(--accent); color: var(--accent); }

  .chat-area { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  .chat-area::-webkit-scrollbar { width: 6px; }
  .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .msg { display: flex; gap: 12px; max-width: 820px; }
  .msg.user { flex-direction: row-reverse; align-self: flex-end; }
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; flex-shrink: 0; }
  .avatar.ai { background: linear-gradient(135deg,#0d2137,#1c4070); color: var(--accent); border: 1px solid #1c4070; }
  .avatar.user { background: linear-gradient(135deg,#0d2114,#1a4a22); color: var(--accent2); border: 1px solid #1a4a22; }

  .bubble { background: var(--ai-bubble); border: 1px solid var(--border); border-radius: 12px; padding: 12px 16px; font-size: 14px; line-height: 1.6; max-width: 680px; }
  .msg.user .bubble { background: var(--user-bubble); border-color: #1c4070; }
  .bubble code { background: #0d1117; border: 1px solid var(--border); padding: 1px 5px; border-radius: 4px; font-family: var(--font-mono); font-size: 12px; color: #f8cc7a; }
  .bubble pre { background: #0d1117; border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin: 8px 0; overflow-x: auto; font-family: var(--font-mono); font-size: 12px; line-height: 1.5; }
  .bubble ul { padding-left: 18px; margin: 6px 0; }
  .bubble li { margin: 3px 0; }
  .bubble strong { color: var(--accent); }
  .bubble a { color: var(--accent); }
  .msg-time { font-size: 10px; color: var(--muted); margin-top: 4px; text-align: right; }

  .thinking { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 13px; padding: 8px 0; }
  .thinking-dots span { display: inline-block; width: 5px; height: 5px; background: var(--muted); border-radius: 50%; animation: bounce 1.2s infinite; }
  .thinking-dots span:nth-child(2) { animation-delay: .2s; }
  .thinking-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-5px)} }

  .input-area { background: var(--surface); border-top: 1px solid var(--border); padding: 16px 20px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0; }
  textarea { flex: 1; background: #21262d; border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: inherit; font-size: 14px; padding: 10px 14px; resize: none; min-height: 44px; max-height: 160px; outline: none; transition: border-color 0.15s; line-height: 1.5; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  .send-btn { background: var(--accent); border: none; border-radius: 8px; color: #000; cursor: pointer; padding: 10px 16px; font-size: 14px; font-weight: 600; font-family: inherit; transition: all 0.15s; height: 44px; }
  .send-btn:hover { background: #79c0ff; }
  .send-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
</style>
</head>
<body>

<header>
  <div class="logo">⚡ Flashcard <span>Planet</span> Agent</div>
  <div class="header-right">
    <span class="model-badge">deepseek-r1</span>
    <div class="status-dot" id="statusDot"></div>
    <span class="status-label" id="statusLabel">就緒</span>
  </div>
</header>

<div class="context-bar">
  <span class="ctx-badge blue">🐍 Python / FastAPI</span>
  <span class="ctx-badge green">🚀 Railway</span>
  <span class="ctx-badge blue">🗄️ PostgreSQL</span>
  <span class="ctx-badge yellow">🃏 25 Pokemon 卡組</span>
  <span class="ctx-badge green">✅ eBay ingest 已啟用</span>
  <span class="ctx-badge yellow">⏳ YGO Phase 2 待驗證</span>
</div>

<div class="quick-actions">
  <button class="qa-btn" onclick="quickAsk('幫我寫 SQL 查詢 scheduler_run_log 驗證最近的排程執行狀態')">📊 查 scheduler 紀錄</button>
  <button class="qa-btn" onclick="quickAsk('eBay ingest 跑了嗎？幫我寫驗證用的 SQL')">✅ 驗證 eBay ingest</button>
  <button class="qa-btn" onclick="quickAsk('我想啟動 YGO Phase 2，需要做什麼？')">🎴 YGO Phase 2 清單</button>
  <button class="qa-btn" onclick="quickAsk('幫我寫一個 PR 描述，說明新增 10 個 Pokemon 卡組的變更')">📝 產生 PR 描述</button>
  <button class="qa-btn" onclick="quickAsk('Pokemon 全套歷史卡的覆蓋率（~20,000 張），我該怎麼規劃？')">🗺️ 全套覆蓋規劃</button>
  <button class="qa-btn" onclick="quickAsk('目前平台有哪些「設計但尚未執行」的元件需要注意？')">⚠️ 未驗證元件</button>
</div>

<div class="chat-area" id="chatArea">
  <div class="msg">
    <div class="avatar ai">FP</div>
    <div>
      <div class="bubble">
        你好，我是 <strong>Flashcard Planet Agent</strong>。<br><br>
        我了解你的平台現況，可以幫你寫 SQL 查詢、部署驗證、PR 描述、或下一步規劃。直接開始吧！
      </div>
      <div class="msg-time" id="initTime"></div>
    </div>
  </div>
</div>

<div class="input-area">
  <textarea id="userInput" placeholder="輸入關於 Flashcard Planet 的任何問題..." rows="1"
    onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">發送</button>
</div>

<script>
const SYSTEM_PROMPT = `你是 Flashcard Planet (閃卡星球) 的專屬 AI 開發助理。這是一個由 Ivan (GitHub: ivancjz) 獨立開發的 Pokemon TCG（未來含 Yu-Gi-Oh）價格追蹤與信號分析平台。

## 技術棧
- 後端：Python / FastAPI
- 託管：Railway（從 main 分支自動部署）
- 資料庫：PostgreSQL
- 警報：Discord bot
- 資料來源：Pokemon TCG API (TCGPlayer)、eBay API（有額度控制）
- 監控：GitHub (ivancjz)，PR-based workflow

## 目前平台現況
- 25 個 Pokemon 卡組已設定（~4,318 張），包含 Evolving Skies, Lost Origin, Crown Zenith 等高流動卡組
- eBay ingest 已啟用，Railway env var 設定，每日額度上限（UTC 03:00 cron 排程）
- Signal sweep 已修復（之前因 next_run_time=None 導致失敗）
- Scheduler 開機行為：每次部署後重新啟動（ingest +2min, bulk-refresh +5min, signal-sweep +10min, heartbeat +12min）
- YGO Phase 2 明確延後到 eBay 驗證通過後

## Schema 重要細節
- assets 表格沒有 set_code 欄位
- Set 身份存在 metadata->>'set_id' 作為 JSONB 欄位（如 "base1", "sv8pt5"）
- 驗證排程用 scheduler_run_log 表格

## 核心原則
1. 合併 ≠ 部署 ≠ 驗證：每次程式變更需要 scheduler_run_log SQL 確認 + Discord 警報觀察
2. 「設計但尚未執行」模式：對任何未明確確認運行過的元件保持懷疑
3. 先建立安全後再擴展：觸發自動行為前，先建立完全安全
4. 以證據為先：假設不是事實，直到有 SQL 或來自 Discord 觀察的證據

回答要具體、技術性強、直接給出可執行的代碼或 SQL。用繁體中文為主，代碼和 SQL 保持英文。`;

const chatArea = document.getElementById('chatArea');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const statusDot = document.getElementById('statusDot');
const statusLabel = document.getElementById('statusLabel');
let messages = [];
let isLoading = false;

document.getElementById('initTime').textContent = new Date().toLocaleTimeString('zh-TW');

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function quickAsk(text) {
  userInput.value = text;
  autoResize(userInput);
  sendMessage();
}

function addMessage(role, content) {
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : ''}`;
  const avatar = document.createElement('div');
  avatar.className = `avatar ${role === 'user' ? 'user' : 'ai'}`;
  avatar.textContent = role === 'user' ? 'I' : 'FP';
  const wrapper = document.createElement('div');
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatMessage(content);
  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = new Date().toLocaleTimeString('zh-TW');
  wrapper.appendChild(bubble);
  wrapper.appendChild(timeEl);
  div.appendChild(avatar);
  div.appendChild(wrapper);
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function formatMessage(text) {
  text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${escapeHtml(code.trim())}</code></pre>`);
  text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
  text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  text = text.replace(/\n/g, '<br>');
  return text;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function addThinking() {
  const div = document.createElement('div');
  div.className = 'msg'; div.id = 'thinking';
  div.innerHTML = `<div class="avatar ai">FP</div>
    <div class="thinking">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <span>思考中...</span>
    </div>`;
  chatArea.appendChild(div);
  chatArea.scrollTop = chatArea.scrollHeight;
}

async function sendMessage() {
  const text = userInput.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  userInput.value = '';
  userInput.style.height = 'auto';
  statusDot.className = 'status-dot red';
  statusLabel.textContent = '請求中...';

  addMessage('user', text);
  messages.push({ role: 'user', content: text });
  addThinking();

  try {
    const res = await fetch('/api/agent/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'system', content: SYSTEM_PROMPT }, ...messages]
      })
    });

    const data = await res.json();
    document.getElementById('thinking')?.remove();

    if (data.error) {
      addMessage('assistant', `**錯誤**：${data.error.message}`);
    } else {
      const reply = data.choices?.[0]?.message?.content || '發生錯誤，請重試。';
      messages.push({ role: 'assistant', content: reply });
      addMessage('assistant', reply);
    }
  } catch (err) {
    document.getElementById('thinking')?.remove();
    addMessage('assistant', `**連線錯誤**：${err.message}`);
  }

  isLoading = false;
  sendBtn.disabled = false;
  statusDot.className = 'status-dot';
  statusLabel.textContent = '就緒';
  userInput.focus();
}
</script>
</body>
</html>
