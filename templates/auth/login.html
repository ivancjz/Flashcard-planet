<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Flashcard Planet</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    .card { max-width: 420px; margin: 80px auto; padding: 32px; background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    h1 { margin: 0 0 8px; font-size: 24px; color: #111; }
    p.sub { color: #666; margin: 0 0 32px; }
    .btn-google { display: block; text-align: center; padding: 12px; border: 1px solid #ddd; border-radius: 6px; text-decoration: none; color: #333; margin-bottom: 24px; font-weight: 500; }
    .btn-google:hover { background: #f9f9f9; }
    .divider { text-align: center; color: #aaa; margin: 24px 0; font-size: 13px; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #333; }
    input[type=email] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 16px; box-sizing: border-box; font-size: 15px; }
    button[type=submit] { width: 100%; padding: 12px; background: #2563eb; color: #fff; border: 0; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 15px; }
    button[type=submit]:hover { background: #1d4ed8; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Sign in to Flashcard Planet</h1>
    <p class="sub">Track Pokémon TCG prices and signals.</p>

    <a href="/auth/google/login" class="btn-google">
      Continue with Google
    </a>

    <div class="divider">or</div>

    <form method="post" action="/auth/magic-link/request">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required placeholder="you@example.com">
      <button type="submit">Send magic link</button>
    </form>
  </div>
</body>
</html>
