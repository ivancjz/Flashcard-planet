<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Check your email — Flashcard Planet</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 0; }
    .card { max-width: 420px; margin: 80px auto; padding: 32px; background: #fff; border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.1); text-align: center; }
    h1 { font-size: 22px; color: #111; }
    p { color: #555; line-height: 1.6; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Check your email</h1>
    <p>We sent a sign-in link to <strong>{{ email }}</strong>.</p>
    <p>The link expires in 15 minutes. <a href="/login">Send another.</a></p>
  </div>
</body>
</html>
