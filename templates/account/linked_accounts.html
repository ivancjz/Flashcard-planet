<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Account — Flashcard Planet</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; margin: 0; padding: 40px 20px; }
    .card { max-width: 480px; margin: 0 auto; background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
    h1 { margin: 0 0 24px; font-size: 22px; }
    .row { display: flex; justify-content: space-between; align-items: center; padding: 16px 0; border-bottom: 1px solid #f0f0f0; }
    .label { font-weight: 500; }
    .value { color: #666; font-size: 14px; }
    .btn { display: inline-block; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 14px; font-weight: 500; }
    .btn-primary { background: #2563eb; color: #fff; }
    .btn-secondary { border: 1px solid #ddd; color: #333; }
    .badge-linked { color: #16a34a; font-size: 13px; }
    .badge-unlinked { color: #9ca3af; font-size: 13px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Account</h1>

    <div class="row">
      <div>
        <div class="label">Email</div>
        <div class="value">{{ user.email }}</div>
      </div>
    </div>

    <div class="row">
      <div>
        <div class="label">Discord</div>
        {% if user.discord_user_id %}
          <div class="badge-linked">Linked ({{ user.username or user.discord_user_id }})</div>
        {% else %}
          <div class="badge-unlinked">Not linked</div>
        {% endif %}
      </div>
      {% if not user.discord_user_id %}
        <a href="/account/link-discord" class="btn btn-primary">Link Discord</a>
      {% endif %}
    </div>

    <div style="margin-top: 24px;">
      <a href="/auth/logout" class="btn btn-secondary">Sign out</a>
    </div>
  </div>
</body>
</html>
