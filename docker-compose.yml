services:
  postgres:
    image: postgres:16
    container_name: flashcard-planet-postgres
    environment:
      POSTGRES_DB: flashcard_planet
      POSTGRES_USER: flashcard
      POSTGRES_PASSWORD: flashcard
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
