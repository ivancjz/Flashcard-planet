[phases.setup]
# Merge nodejs_20 into the nix environment alongside auto-detected Python packages.
# nixPkgs entries are additive — they do NOT replace what nixpacks generates for Python.
nixPkgs = ["nodejs_20"]

[phases.build]
# Python projects have no generated build commands, so replacing with the
# frontend build is safe. pip install still runs in the [phases.install] phase
# (auto-generated by nixpacks from requirements.txt).
cmds = ["cd frontend && npm ci && npm run build"]
