[variables]
# Pin Python 3.13 via documented Nixpacks mechanism (not nixPkgs, which would conflict).
NIXPACKS_PYTHON_VERSION = "3.13"

[phases.setup]
# Pin nixpkgs to a commit where nodejs_22 = 22.13.1 (satisfies Vite 8's >=22.12.0).
# Default snapshot bc8f8d1 has nodejs_22=22.10.0 (too old) and no nodejs_24 yet.
# 51ad838 commit message: "nodejs_22: 22.12.0 -> 22.13.1" (2025-01-22).
nixpkgsArchive = "51ad838b03a05b1de6f9f2a0fffecee64a9788ee"
# "..." is required to EXTEND provider-generated packages; without it, the array replaces them.
nixPkgs = ["...", "nodejs_22"]

[phases.build]
# Python projects have no auto-generated build commands, so overriding [phases.build]
# with the frontend build is safe — pip install already ran in [phases.install].
# npm ci instead of npm install: reproducible, locked to package-lock.json.
cmds = ["cd frontend && npm ci && npm run build"]

# [start] intentionally omitted — railway.toml startCommand handles it.
