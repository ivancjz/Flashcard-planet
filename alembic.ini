[alembic]
# Path to migration scripts directory
script_location = alembic

# Prepend sys.path with the project root so model imports work
prepend_sys_path = .

# sqlalchemy.url is intentionally left blank here.
# env.py reads it from backend.app.core.config.get_settings().database_url
# so that the same .env-based config drives both the app and migrations.
sqlalchemy.url =

# Template used to generate new migration file names
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
